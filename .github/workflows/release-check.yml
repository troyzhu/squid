name: release-check

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".claude-plugin/plugin.json"

jobs:
  tag-matches-manifest:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag version must equal plugin.json version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##refs/tags/}"
          tag_version="${tag#v}"
          manifest_version="$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          echo "tag:      ${tag} (version=${tag_version})"
          echo "manifest: ${manifest_version}"
          if [[ "${tag_version}" != "${manifest_version}" ]]; then
            echo "::error::tag ${tag} disagrees with .claude-plugin/plugin.json version ${manifest_version}"
            exit 1
          fi

  manifest-version-is-valid:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: plugin.json must have a valid semver version
        run: |
          set -euo pipefail
          version="$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          echo "manifest version: ${version}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::.claude-plugin/plugin.json version '${version}' is not valid semver (X.Y.Z)"
            exit 1
          fi
